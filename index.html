<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Formularübersicht</title>

<style>
html {
  background-color: #ff7f00;
  padding: 10px;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  margin: 0;
  min-height: calc(100vh - 20px);
  background-color: #000;
  color: orange;
  display: flex;
  justify-content: center;
  align-items: center;
  border-radius: 25px;
  border: 10px solid #ff7f00;
  box-sizing: border-box;
}

.textbox {
  width: 80%;
  max-width: 800px;
  padding: 20px;
  text-align: center;
  background-color: #000;
  border-radius: 25px;
}

h3 {
  font-size: 24px;
  margin-bottom: 25px;
}

ul {
  list-style: none;
  padding: 0;
  margin: 0;
}

li {
  font-size: 1.2em;
  margin: 15px 0;
}

/* BUTTON STYLE */
.form-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 22px;
  border: 2px solid #ff7f00;
  border-radius: 14px;
  color: #ffcc80;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s ease;
  box-shadow: 0 0 12px rgba(255,127,0,0.45);
}

.form-btn:hover {
  box-shadow: 0 0 22px rgba(255,127,0,0.9);
  transform: scale(1.03);
  border-color: #ff9a2f;
  color: #ff7f00;
}

/* OVERLAY */
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  display: none;
  justify-content: center;
  align-items: center;
  border-radius: 25px;
}

#overlay.active {
  display: flex;
}

.scene {
  position: relative;
  width: 300px;
  height: 300px;
}

.mailbox {
  font-size: 4rem;
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
}

.letter {
  font-size: 2rem;
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  opacity: 0;
}

#overlay.active .letter {
  animation: flyToMailbox 1s ease forwards;
  animation-delay: 1.2s;
}

@keyframes flyToMailbox {
  0% { top: 0; opacity: 0; transform: translateX(-50%) scale(0.8); }
  20% { opacity: 1; }
  100% { top: 220px; opacity: 0; transform: translateX(-50%) scale(1.2); }
}

.paper {
  position: absolute;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  opacity: 0;
}

#overlay.active .paper {
  animation: showPaper 0.5s forwards;
  animation-delay: 0.2s;
}

@keyframes showPaper {
  to { opacity: 1; transform: translateX(-50%) scale(1.05); }
}

.stamp {
  position: absolute;
  top: 120px;
  left: 50%;
  transform: translateX(-50%) scale(2);
  opacity: 0;
  color: red;
  font-weight: bold;
}

#overlay.active .stamp {
  animation: stamp 0.4s forwards;
  animation-delay: 0.7s;
}

@keyframes stamp {
  0% { transform: translateX(-50%) scale(3) rotate(-20deg); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: translateX(-50%) scale(1) rotate(0deg); opacity: 1; }
}
</style>
</head>

<body>

<div class="textbox">
  <h3>Hier kannst du auf verschiedene Formulare zugreifen:</h3>

  <ul>
    <li>
      <a class="form-btn" href="https://sites.google.com/view/sunnysschaetze/home/formulare/kontaktformular">
        📧 Kontaktformular
      </a>
    </li>
    <li>
      <a class="form-btn" href="https://sites.google.com/view/sunnysschaetze/home/formulare/widerrufsformular">
        ↩️ Widerrufsformular
      </a>
    </li>
    <li>
      <a class="form-btn" href="https://sites.google.com/view/sunnysschaetze/home/formulare/beschwerdeformular">
        💬 Beschwerdeformular
      </a>
    </li>
  </ul>
</div>

<div id="overlay">
  <div class="scene">
    <div class="mailbox">📮</div>
    <div class="letter">✉️</div>
    <div class="paper">📄 Formular wird verarbeitet</div>
    <div class="stamp">STEMPEL</div>
  </div>
</div>

<script>
const overlay = document.getElementById("overlay");

document.querySelectorAll("a").forEach(link => {
  link.addEventListener("click", function(e) {
    e.preventDefault();
    const url = this.href;
    overlay.classList.add("active");
    setTimeout(() => {
      window.open(url, "_blank");
      overlay.classList.remove("active");
    }, 2000);
  });
});
</script>

</body>
</html>
