<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html {
      background-color: #ff7f00;
      padding: 10px;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      min-height: calc(100vh - 20px);
      background-color: #000000;
      color: orange;

      border-radius: 25px;
      overflow: hidden;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    .textbox {
      width: 80%;
      max-width: 800px;
      padding: 20px;
      box-sizing: border-box;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      text-align: center;
    }

    h3 {
      font-size: 24px;
      margin-bottom: 25px;
    }

    ul {
      list-style-type: none;
      padding: 0;
      margin: 0;
    }

    li {
      font-size: 1.2em;
      margin-bottom: 10px;
    }

    a {
      color: #ffcc80;
      text-decoration: none;
      font-weight: bold;
      transition: color 0.3s;
    }

    a:hover {
      color: #ff7f00;
    }
  </style>

  <title>Umfragen</title>
</head>
<body>

  <div class="textbox">
    <h3>Hier gibt es immer spannende Umfragen!</h3>

    <ul>
      <li>
        📝 <a href="https://sites.google.com/view/sunnysschaetze/home/formulare/umfrage" target="_blank">
          Zur Umfrage
        </a>
      </li>
    </ul>
  </div>

</body>
</html>
