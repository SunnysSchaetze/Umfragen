<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Umfragen</title>

<style>
html {
  height: 100%;
  margin: 0;
  padding: 2px;
  box-sizing: border-box;
  background-color: #ff7f00;
}

* {
  box-sizing: border-box;
}

body {
  width: 100%;
  height: 100%;
  margin: 0;

  font-family: Arial, sans-serif;
  background-color: #000;
  color: orange;

  border-radius: 25px;
  overflow: hidden;

  display: flex;
  justify-content: center;
  align-items: center;
}

.textbox {
    text-align: center;
    padding: 15px;
}

h3 {
    font-size: 18px;
    margin-bottom: 20px;
}

ul {
    list-style: none;
    padding: 0;
    margin: 0;
}

/* BUTTON STYLE */
.survey-btn{
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:8px 12px;
    border:2px solid #ff7f00;
    border-radius:10px;
    color:#ffcc80;
    text-decoration:none;
    font-weight:bold;
    font-size:0.9em;
    background:transparent;
    box-shadow:0 0 12px rgba(255,127,0,.45);
    transition:0.3s ease;
}

.survey-btn:hover{
    box-shadow:0 0 22px rgba(255,127,0,.9);
    border-color:#ff9a2f;
    transform:scale(1.03);
}

li {
    font-size: 1em;
}

a:hover {
    color: #ff7f00;
}

#overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    justify-content: center;
    align-items: center;
}

#overlay.active {
    display: flex;
}

.scene {
    position: relative;
    width: min(90vw, 800px);
    height: 260px;
}

.chart {
    position: relative;
    width: 100%;
    height: 100%;
}

.bars {
    position: absolute;
    bottom: 0;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    width: 100%;
    height: 100%;
}

.bar {
    width: 18px;
    background: orange;
    box-shadow: 0 0 10px orange;
    transform-origin: bottom;
    transform: scaleY(0);
    transition: transform 0.4s ease;
}

svg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

.line {
    fill: none;
    stroke: #ffcc80;
    stroke-width: 3;
    filter: drop-shadow(0 0 6px orange);
    stroke-dasharray: 1000;
    stroke-dashoffset: 1000;
}

.draw {
    animation: drawLine 1.2s ease forwards;
}

@keyframes drawLine {
    to { stroke-dashoffset: 0; }
}

.scan-line {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, transparent, #ffcc80, orange, #ffcc80, transparent);
    box-shadow: 0 0 12px orange;
    animation: scan 1.8s linear forwards;
}

@keyframes scan {
    0% { transform: translateY(0px); opacity: 0; }
    10% { opacity: 1; }
    100% { transform: translateY(260px); opacity: 0; }
}
</style>

</head>

<body>

<div class="textbox">
    <h3>Hier gibt es immer spannende Umfragen!</h3>

    <ul>
        <li>
            <a class="survey-btn" id="surveyLink" href="https://www.sunnysschaetze.de/home/community/umfragen">
                📝 Umfragen
            </a>
        </li>
    </ul>
</div>

<div id="overlay">
    <div class="scene">
        <div class="chart" id="chart"></div>
    </div>
</div>

<script>
const link = document.getElementById("surveyLink");
const overlay = document.getElementById("overlay");

const values = [30, 80, 50, 100, 60, 90, 40];

link.addEventListener("click", function(e) {
    e.preventDefault();

    overlay.classList.remove("active");
    void overlay.offsetWidth;
    overlay.classList.add("active");

    const chart = document.getElementById("chart");
    chart.innerHTML = "";

    const bars = document.createElement("div");
    bars.className = "bars";

    const scan = document.createElement("div");
    scan.className = "scan-line";

    const svgNS = "http://www.w3.org/2000/svg";
    const svg = document.createElementNS(svgNS, "svg");

    const path = document.createElementNS(svgNS, "path");
    path.classList.add("line");

    const maxVal = Math.max(...values);
    const chartHeight = 240;

    const step = chart.offsetWidth / (values.length - 1);

    const scaleY = (val) => (val / maxVal) * chartHeight;

    let points = [];

    values.forEach((val, i) => {

        const h = scaleY(val);

        const bar = document.createElement("div");
        bar.className = "bar";
        bar.style.height = h + "px";

        setTimeout(() => {
            bar.style.transform = "scaleY(1)";
        }, i * 120);

        bars.appendChild(bar);

        const x = i * step;
        const y = chartHeight - h;

        points.push({ x, y });
    });

    let d = "";
    points.forEach((p, i) => {
        d += i === 0 ? `M ${p.x} ${p.y}` : ` L ${p.x} ${p.y}`;
    });

    path.setAttribute("d", d);

    svg.appendChild(path);
    chart.appendChild(bars);
    chart.appendChild(svg);
    chart.appendChild(scan);

    setTimeout(() => {
        path.classList.add("draw");
    }, 50);

    setTimeout(() => {
        overlay.classList.remove("active");
    }, 2000);

    setTimeout(() => {
        window.open(link.href, "_blank");
    }, 1800);
});
</script>

</body>
</html>
